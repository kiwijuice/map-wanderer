<svg xmlns="http://www.w3.org/2000/svg" width="64" height="90" viewBox="0 0 64 90">
  <defs>
    <!-- Left wall - warm cream/yellow -->
    <linearGradient id="lw" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#f0e0a0"/>
      <stop offset="100%" stop-color="#d8c880"/>
    </linearGradient>
    <!-- Right wall - shadowed cream -->
    <linearGradient id="rw" x1="1" y1="0" x2="0" y2="0.5">
      <stop offset="0%" stop-color="#b8a868"/>
      <stop offset="100%" stop-color="#a09050"/>
    </linearGradient>
    <!-- Roof left slope - forest green -->
    <linearGradient id="rl" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#3a8848"/>
      <stop offset="100%" stop-color="#286838"/>
    </linearGradient>
    <!-- Roof right slope - darker green -->
    <linearGradient id="rr" x1="1" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e5830"/>
      <stop offset="100%" stop-color="#164828"/>
    </linearGradient>
  </defs>

  <!-- LEFT WALL -->
  <polygon points="0,74 32,90 32,62 0,46" fill="url(#lw)" stroke="#c0a860" stroke-width="0.6"/>

  <!-- Left wall horizontal lines (siding) -->
  <line x1="0" y1="52" x2="32" y2="68" stroke="#c8b070" stroke-width="0.3"/>
  <line x1="0" y1="58" x2="32" y2="74" stroke="#c8b070" stroke-width="0.3"/>
  <line x1="0" y1="64" x2="32" y2="80" stroke="#c8b070" stroke-width="0.3"/>
  <line x1="0" y1="70" x2="32" y2="86" stroke="#c8b070" stroke-width="0.3"/>

  <!-- Left wall windows with shutters -->
  <rect x="3" y="54" width="2" height="7" fill="#287038" stroke="#186028" stroke-width="0.3"/>
  <rect x="5" y="54" width="5" height="7" rx="0.3" fill="#ffeebb" stroke="#a09050" stroke-width="0.4"/>
  <line x1="7.5" y1="54" x2="7.5" y2="61" stroke="#c0a860" stroke-width="0.3"/>
  <rect x="10" y="54" width="2" height="7" fill="#287038" stroke="#186028" stroke-width="0.3"/>
  <!-- Flower box -->
  <rect x="4" y="61" width="7" height="2" fill="#6a4020" stroke="#5a3018" stroke-width="0.3"/>
  <circle cx="5.5" cy="60.5" r="1" fill="#e04060"/>
  <circle cx="7.5" cy="59.8" r="1" fill="#f06080"/>
  <circle cx="9.5" cy="60.2" r="1" fill="#e85070"/>

  <rect x="15" y="50" width="2" height="7" fill="#287038" stroke="#186028" stroke-width="0.3"/>
  <rect x="17" y="50" width="5" height="7" rx="0.3" fill="#ffeebb" stroke="#a09050" stroke-width="0.4"/>
  <line x1="19.5" y1="50" x2="19.5" y2="57" stroke="#c0a860" stroke-width="0.3"/>
  <rect x="22" y="50" width="2" height="7" fill="#287038" stroke="#186028" stroke-width="0.3"/>
  <!-- Flower box -->
  <rect x="16" y="57" width="7" height="2" fill="#6a4020" stroke="#5a3018" stroke-width="0.3"/>
  <circle cx="17.5" cy="56.5" r="1" fill="#f0c020"/>
  <circle cx="19.5" cy="56" r="1" fill="#f8d040"/>
  <circle cx="21.5" cy="56.3" r="1" fill="#f0c020"/>

  <!-- Left wall door -->
  <rect x="24" y="74" width="6" height="12" rx="0.8" fill="#5a3820" stroke="#402810" stroke-width="0.5"/>
  <circle cx="29" cy="80" r="0.6" fill="#c8a040"/>
  <!-- Door arch -->
  <path d="M24,74 Q27,71 30,74" fill="none" stroke="#4a2818" stroke-width="0.6"/>

  <!-- RIGHT WALL -->
  <polygon points="64,74 32,90 32,62 64,46" fill="url(#rw)" stroke="#988848" stroke-width="0.6"/>

  <!-- Right wall siding lines -->
  <line x1="64" y1="52" x2="32" y2="68" stroke="#a89858" stroke-width="0.3"/>
  <line x1="64" y1="58" x2="32" y2="74" stroke="#a89858" stroke-width="0.3"/>
  <line x1="64" y1="64" x2="32" y2="80" stroke="#a89858" stroke-width="0.3"/>
  <line x1="64" y1="70" x2="32" y2="86" stroke="#a89858" stroke-width="0.3"/>

  <!-- Right wall windows with shutters -->
  <rect x="42" y="54" width="2" height="7" fill="#206830" stroke="#185828" stroke-width="0.3"/>
  <rect x="44" y="54" width="5" height="7" rx="0.3" fill="#ffe8aa" stroke="#988848" stroke-width="0.4"/>
  <line x1="46.5" y1="54" x2="46.5" y2="61" stroke="#b8a060" stroke-width="0.3"/>
  <rect x="49" y="54" width="2" height="7" fill="#206830" stroke="#185828" stroke-width="0.3"/>
  <rect x="43" y="61" width="7" height="2" fill="#6a4020" stroke="#5a3018" stroke-width="0.3"/>
  <circle cx="44.5" cy="60.5" r="1" fill="#e04060"/>
  <circle cx="46.5" cy="60" r="1" fill="#f06080"/>
  <circle cx="48.5" cy="60.3" r="1" fill="#e85070"/>

  <rect x="55" y="50" width="2" height="7" fill="#206830" stroke="#185828" stroke-width="0.3"/>
  <rect x="53" y="50" width="2" height="7" fill="#206830" stroke="#185828" stroke-width="0.3"/>
  <rect x="55" y="50" width="4" height="7" rx="0.3" fill="#ffe8aa" stroke="#988848" stroke-width="0.4"/>

  <!-- ROOF - pyramid style -->
  <!-- Back-right slope -->
  <polygon points="64,46 32,30 32,20" fill="#144020"/>
  <!-- Back-left slope -->
  <polygon points="32,30 0,46 32,20" fill="#2a7038"/>
  <!-- Left front slope -->
  <polygon points="0,46 32,62 32,20" fill="url(#rl)" stroke="#287038" stroke-width="0.5"/>
  <!-- Right front slope -->
  <polygon points="32,62 64,46 32,20" fill="url(#rr)" stroke="#1a4828" stroke-width="0.5"/>

  <!-- Roof ridge highlights -->
  <line x1="32" y1="20" x2="0" y2="46" stroke="#4a9858" stroke-width="0.5"/>
  <line x1="32" y1="20" x2="32" y2="62" stroke="#2a6838" stroke-width="0.4"/>

  <!-- Chimney -->
  <rect x="10" y="30" width="5" height="10" fill="#886848" stroke="#6a5038" stroke-width="0.4"/>
  <rect x="9" y="28" width="7" height="3" fill="#987858" stroke="#7a6040" stroke-width="0.3"/>
</svg>
