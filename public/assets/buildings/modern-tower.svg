<svg xmlns="http://www.w3.org/2000/svg" width="100" height="190" viewBox="0 0 100 190">
  <defs>
    <!-- Left face: warm tinted glass -->
    <linearGradient id="lf" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%" stop-color="#b8cce0"/>
      <stop offset="50%" stop-color="#90b0cc"/>
      <stop offset="100%" stop-color="#7898b4"/>
    </linearGradient>
    <!-- Right face: cooler glass -->
    <linearGradient id="rf" x1="1" y1="0" x2="0" y2="0.4">
      <stop offset="0%" stop-color="#6888a4"/>
      <stop offset="50%" stop-color="#587898"/>
      <stop offset="100%" stop-color="#486880"/>
    </linearGradient>
    <!-- Roof -->
    <linearGradient id="roof" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8e4f0"/>
      <stop offset="100%" stop-color="#b0c4d8"/>
    </linearGradient>
    <!-- Window glow -->
    <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(220,240,255,0.7)"/>
      <stop offset="100%" stop-color="rgba(140,180,210,0.3)"/>
    </linearGradient>
    <!-- Accent stripe -->
    <linearGradient id="acc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8a040"/>
      <stop offset="100%" stop-color="#c88030"/>
    </linearGradient>
  </defs>

  <!-- ========== BUILDING BODY ========== -->
  <!-- Left face -->
  <polygon points="18,168 50,184 50,44 18,28" fill="url(#lf)" stroke="#607888" stroke-width="0.6"/>
  <!-- Right face -->
  <polygon points="82,168 50,184 50,44 82,28" fill="url(#rf)" stroke="#506878" stroke-width="0.6"/>
  <!-- Top face (roof) -->
  <polygon points="50,12 82,28 50,44 18,28" fill="url(#roof)" stroke="#8098a8" stroke-width="0.5"/>

  <!-- ========== LEFT FACE DETAILS ========== -->
  <!-- Steel frame – horizontal floors -->
  <line x1="18" y1="48" x2="50" y2="64" stroke="#608090" stroke-width="0.5"/>
  <line x1="18" y1="68" x2="50" y2="84" stroke="#608090" stroke-width="0.5"/>
  <line x1="18" y1="88" x2="50" y2="104" stroke="#608090" stroke-width="0.5"/>
  <line x1="18" y1="108" x2="50" y2="124" stroke="#608090" stroke-width="0.5"/>
  <line x1="18" y1="128" x2="50" y2="144" stroke="#608090" stroke-width="0.5"/>
  <line x1="18" y1="148" x2="50" y2="164" stroke="#6080908" stroke-width="0.5"/>
  <!-- Steel frame – vertical mullions -->
  <line x1="26" y1="36" x2="26" y2="172" stroke="#6080908" stroke-width="0.4"/>
  <line x1="34" y1="40" x2="34" y2="176" stroke="#6080908" stroke-width="0.4"/>
  <line x1="42" y1="44" x2="42" y2="180" stroke="#6080908" stroke-width="0.4"/>
  <!-- Glass panels (left face) -->
  <rect x="20" y="50" width="5" height="10" rx="0.5" fill="url(#wg)" opacity="0.6"/>
  <rect x="28" y="55" width="5" height="10" rx="0.5" fill="url(#wg)" opacity="0.5"/>
  <rect x="36" y="59" width="5" height="10" rx="0.5" fill="url(#wg)" opacity="0.7"/>
  <rect x="20" y="70" width="5" height="10" rx="0.5" fill="url(#wg)" opacity="0.5"/>
  <rect x="28" y="75" width="5" height="10" rx="0.5" fill="url(#wg)" opacity="0.6"/>
  <rect x="36" y="79" width="5" height="10" rx="0.5" fill="url(#wg)" opacity="0.4"/>
  <rect x="20" y="90" width="5" height="10" rx="0.5" fill="url(#wg)" opacity="0.7"/>
  <rect x="28" y="95" width="5" height="10" rx="0.5" fill="url(#wg)" opacity="0.5"/>
  <rect x="36" y="99" width="5" height="10" rx="0.5" fill="url(#wg)" opacity="0.6"/>
  <rect x="20" y="110" width="5" height="10" rx="0.5" fill="url(#wg)" opacity="0.4"/>
  <rect x="28" y="115" width="5" height="10" rx="0.5" fill="url(#wg)" opacity="0.7"/>
  <rect x="36" y="119" width="5" height="10" rx="0.5" fill="url(#wg)" opacity="0.5"/>
  <rect x="20" y="130" width="5" height="10" rx="0.5" fill="url(#wg)" opacity="0.6"/>
  <rect x="28" y="135" width="5" height="10" rx="0.5" fill="url(#wg)" opacity="0.4"/>
  <rect x="36" y="139" width="5" height="10" rx="0.5" fill="url(#wg)" opacity="0.7"/>
  <!-- Reflection highlight strip -->
  <polygon points="19,35 24,37 24,165 19,163" fill="rgba(255,255,255,0.07)"/>

  <!-- ========== RIGHT FACE DETAILS ========== -->
  <!-- Steel frame – horizontal floors -->
  <line x1="82" y1="48" x2="50" y2="64" stroke="#506070" stroke-width="0.5"/>
  <line x1="82" y1="68" x2="50" y2="84" stroke="#506070" stroke-width="0.5"/>
  <line x1="82" y1="88" x2="50" y2="104" stroke="#506070" stroke-width="0.5"/>
  <line x1="82" y1="108" x2="50" y2="124" stroke="#506070" stroke-width="0.5"/>
  <line x1="82" y1="128" x2="50" y2="144" stroke="#506070" stroke-width="0.5"/>
  <line x1="82" y1="148" x2="50" y2="164" stroke="#506070" stroke-width="0.5"/>
  <!-- Steel frame – vertical mullions -->
  <line x1="58" y1="44" x2="58" y2="180" stroke="#506070" stroke-width="0.4"/>
  <line x1="66" y1="40" x2="66" y2="176" stroke="#506070" stroke-width="0.4"/>
  <line x1="74" y1="36" x2="74" y2="172" stroke="#506070" stroke-width="0.4"/>
  <!-- Glass panels (right face) -->
  <rect x="53" y="58" width="5" height="10" rx="0.5" fill="url(#wg)" opacity="0.5"/>
  <rect x="61" y="54" width="5" height="10" rx="0.5" fill="url(#wg)" opacity="0.4"/>
  <rect x="69" y="50" width="5" height="10" rx="0.5" fill="url(#wg)" opacity="0.6"/>
  <rect x="53" y="78" width="5" height="10" rx="0.5" fill="url(#wg)" opacity="0.4"/>
  <rect x="61" y="74" width="5" height="10" rx="0.5" fill="url(#wg)" opacity="0.6"/>
  <rect x="69" y="70" width="5" height="10" rx="0.5" fill="url(#wg)" opacity="0.3"/>
  <rect x="53" y="98" width="5" height="10" rx="0.5" fill="url(#wg)" opacity="0.6"/>
  <rect x="61" y="94" width="5" height="10" rx="0.5" fill="url(#wg)" opacity="0.5"/>
  <rect x="69" y="90" width="5" height="10" rx="0.5" fill="url(#wg)" opacity="0.4"/>
  <rect x="53" y="118" width="5" height="10" rx="0.5" fill="url(#wg)" opacity="0.3"/>
  <rect x="61" y="114" width="5" height="10" rx="0.5" fill="url(#wg)" opacity="0.6"/>
  <rect x="69" y="110" width="5" height="10" rx="0.5" fill="url(#wg)" opacity="0.5"/>
  <rect x="53" y="138" width="5" height="10" rx="0.5" fill="url(#wg)" opacity="0.5"/>
  <rect x="61" y="134" width="5" height="10" rx="0.5" fill="url(#wg)" opacity="0.4"/>
  <rect x="69" y="130" width="5" height="10" rx="0.5" fill="url(#wg)" opacity="0.6"/>

  <!-- ========== ROOFTOP ========== -->
  <!-- AC unit -->
  <rect x="42" y="20" width="7" height="5" rx="1" fill="#708090" stroke="#5a6a78" stroke-width="0.4"/>
  <rect x="54" y="24" width="6" height="4" rx="1" fill="#607888" stroke="#506878" stroke-width="0.4"/>
  <!-- Antenna -->
  <line x1="50" y1="12" x2="50" y2="2" stroke="#888" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="50" cy="2" r="1.5" fill="#e44" stroke="#c33" stroke-width="0.4"/>

  <!-- ========== ACCENT ========== -->
  <!-- Gold accent band at top of each face -->
  <line x1="18" y1="32" x2="50" y2="48" stroke="url(#acc)" stroke-width="1.5"/>
  <line x1="82" y1="32" x2="50" y2="48" stroke="url(#acc)" stroke-width="1.2"/>
  <!-- Roof edge highlights -->
  <line x1="18" y1="28" x2="50" y2="12" stroke="#c8d8e8" stroke-width="1"/>
  <line x1="50" y1="12" x2="82" y2="28" stroke="#a8b8c8" stroke-width="1"/>

  <!-- ========== ENTRANCE ========== -->
  <!-- Glass lobby entrance on left face -->
  <rect x="30" y="162" width="8" height="14" rx="1" fill="#2a3a48" stroke="#3a4a58" stroke-width="0.5"/>
  <line x1="34" y1="162" x2="34" y2="176" stroke="#4a5a68" stroke-width="0.4"/>
  <!-- Awning above entrance -->
  <polygon points="28,160 40,166 40,163 28,157" fill="#d09030" opacity="0.7"/>
</svg>
