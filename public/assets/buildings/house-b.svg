<svg xmlns="http://www.w3.org/2000/svg" width="64" height="90" viewBox="0 0 64 90">
  <defs>
    <!-- Left wall - white/light blue -->
    <linearGradient id="lw" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#e8eef4"/>
      <stop offset="100%" stop-color="#c8d4e0"/>
    </linearGradient>
    <!-- Right wall - shadowed white -->
    <linearGradient id="rw" x1="1" y1="0" x2="0" y2="0.5">
      <stop offset="0%" stop-color="#a8b8c8"/>
      <stop offset="100%" stop-color="#90a0b0"/>
    </linearGradient>
    <!-- Roof left slope - slate blue -->
    <linearGradient id="rl" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#5868a0"/>
      <stop offset="100%" stop-color="#404880"/>
    </linearGradient>
    <!-- Roof right slope - darker slate -->
    <linearGradient id="rr" x1="1" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#343868"/>
      <stop offset="100%" stop-color="#282c58"/>
    </linearGradient>
  </defs>

  <!-- LEFT WALL -->
  <polygon points="0,74 32,90 32,62 0,46" fill="url(#lw)" stroke="#a0b0c0" stroke-width="0.6"/>

  <!-- Left wall trim line -->
  <line x1="0" y1="48" x2="32" y2="64" stroke="#6080b0" stroke-width="0.8"/>
  <line x1="0" y1="72" x2="32" y2="88" stroke="#6080b0" stroke-width="0.5"/>

  <!-- Left wall windows - tall Victorian style -->
  <rect x="4" y="54" width="4" height="8" rx="0.3" fill="#b8d8f0" stroke="#5070a0" stroke-width="0.5"/>
  <line x1="6" y1="54" x2="6" y2="62" stroke="#5070a0" stroke-width="0.3"/>
  <rect x="14" y="50" width="4" height="8" rx="0.3" fill="#b8d8f0" stroke="#5070a0" stroke-width="0.5"/>
  <line x1="16" y1="50" x2="16" y2="58" stroke="#5070a0" stroke-width="0.3"/>
  <rect x="4" y="66" width="4" height="8" rx="0.3" fill="#c0e0f8" stroke="#5070a0" stroke-width="0.5"/>
  <line x1="6" y1="66" x2="6" y2="74" stroke="#5070a0" stroke-width="0.3"/>
  <rect x="14" y="62" width="4" height="8" rx="0.3" fill="#c0e0f8" stroke="#5070a0" stroke-width="0.5"/>
  <line x1="16" y1="62" x2="16" y2="70" stroke="#5070a0" stroke-width="0.3"/>

  <!-- Left wall door with pediment -->
  <rect x="23" y="74" width="7" height="12" rx="0.5" fill="#3050a0" stroke="#283880" stroke-width="0.5"/>
  <line x1="26.5" y1="74" x2="26.5" y2="86" stroke="#4060b0" stroke-width="0.3"/>
  <rect x="22" y="72" width="9" height="2.5" fill="#6080b0" stroke="#4060a0" stroke-width="0.3"/>

  <!-- RIGHT WALL -->
  <polygon points="64,74 32,90 32,62 64,46" fill="url(#rw)" stroke="#8898a8" stroke-width="0.6"/>

  <!-- Right wall trim -->
  <line x1="64" y1="48" x2="32" y2="64" stroke="#5070a0" stroke-width="0.7"/>
  <line x1="64" y1="72" x2="32" y2="88" stroke="#5070a0" stroke-width="0.4"/>

  <!-- Right wall windows -->
  <rect x="44" y="54" width="4" height="8" rx="0.3" fill="#a0c8e0" stroke="#4060a0" stroke-width="0.5"/>
  <line x1="46" y1="54" x2="46" y2="62" stroke="#4060a0" stroke-width="0.3"/>
  <rect x="55" y="50" width="4" height="8" rx="0.3" fill="#a0c8e0" stroke="#4060a0" stroke-width="0.5"/>
  <line x1="57" y1="50" x2="57" y2="58" stroke="#4060a0" stroke-width="0.3"/>
  <rect x="44" y="66" width="4" height="8" rx="0.3" fill="#a8d0e8" stroke="#4060a0" stroke-width="0.5"/>
  <line x1="46" y1="66" x2="46" y2="74" stroke="#4060a0" stroke-width="0.3"/>
  <rect x="55" y="62" width="4" height="8" rx="0.3" fill="#a8d0e8" stroke="#4060a0" stroke-width="0.5"/>
  <line x1="57" y1="62" x2="57" y2="70" stroke="#4060a0" stroke-width="0.3"/>

  <!-- ROOF - pyramid style -->
  <!-- Back-right slope -->
  <polygon points="64,46 32,30 32,20" fill="#282c58"/>
  <!-- Back-left slope -->
  <polygon points="32,30 0,46 32,20" fill="#4050a0"/>
  <!-- Left front slope -->
  <polygon points="0,46 32,62 32,20" fill="url(#rl)" stroke="#404878" stroke-width="0.5"/>
  <!-- Right front slope -->
  <polygon points="32,62 64,46 32,20" fill="url(#rr)" stroke="#2c3058" stroke-width="0.5"/>

  <!-- Roof ridge highlights -->
  <line x1="32" y1="20" x2="0" y2="46" stroke="#6878b0" stroke-width="0.5"/>
  <line x1="32" y1="20" x2="32" y2="62" stroke="#4050a0" stroke-width="0.4"/>

  <!-- Dormer window on left roof slope -->
  <polygon points="12,40 20,40 16,34" fill="#6878a0" stroke="#5060a0" stroke-width="0.3"/>
  <rect x="13" y="40" width="6" height="5" fill="#c8d8e8" stroke="#5060a0" stroke-width="0.3"/>
  <line x1="16" y1="40" x2="16" y2="45" stroke="#5060a0" stroke-width="0.3"/>
</svg>
