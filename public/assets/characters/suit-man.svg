<svg xmlns="http://www.w3.org/2000/svg" width="128" height="192" viewBox="0 0 128 192">
<!-- Elegant Minimal Style — Suited Gentleman -->
<defs>
  <linearGradient id="jacket" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#2c3e50"/>
    <stop offset="100%" stop-color="#1a2530"/>
  </linearGradient>
  <linearGradient id="pants" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#2c3e50"/>
    <stop offset="100%" stop-color="#1c2830"/>
  </linearGradient>

  <g id="sh"><ellipse cx="16" cy="44" rx="10" ry="4" fill="rgba(0,0,0,.2)"/></g>

  <!-- ===== Dir 0 (down-right) ===== -->
  <g id="u0">
    <!-- Jacket body -->
    <path d="M8,20 L24,20 L24,32 L8,32 Z" fill="url(#jacket)"/>
    <!-- Lapels -->
    <path d="M12,20 L16,24 L14,24 L10,20 Z" fill="#34495e"/>
    <path d="M20,20 L16,24 L18,24 L22,20 Z" fill="#34495e"/>
    <!-- White shirt peek -->
    <path d="M14,20 L16,24 L18,20 Z" fill="white"/>
    <!-- Tie -->
    <path d="M15.5,24 L16,32 L16.5,24 Z" fill="#c0392b"/>
    <rect x="15" y="23.5" width="2" height="1.5" rx="0.3" fill="#c0392b"/>
    <!-- Pocket square -->
    <path d="M10,22 L12,21 L12,23 Z" fill="white" opacity="0.7"/>
    <!-- Jacket button -->
    <circle cx="16" cy="28" r="0.6" fill="#a0a0a0"/>
    <!-- Arms (jacket sleeves) -->
    <rect x="4" y="20" width="4.5" height="11" rx="1" fill="url(#jacket)"/>
    <rect x="23.5" y="20" width="4.5" height="11" rx="1" fill="url(#jacket)"/>
    <!-- Hands (fair skin) -->
    <rect x="5" y="30.5" width="3" height="2.5" rx="1" fill="#fae3d0"/>
    <rect x="24" y="30.5" width="3" height="2.5" rx="1" fill="#fae3d0"/>
    <!-- Head -->
    <ellipse cx="16" cy="13" rx="7.5" ry="8.5" fill="#fae3d0"/>
    <!-- Hair — slicked back, dark -->
    <path d="M8.5,11 Q9,6 16,5 Q23,6 23.5,11 L23,8 Q22,6 16,5.5 Q10,6 9,8 Z" fill="#1a1a2e"/>
    <ellipse cx="16" cy="7" rx="8" ry="4" fill="#1a1a2e"/>
    <!-- Side part line -->
    <line x1="12" y1="5.5" x2="11" y2="9" stroke="#2a2a40" stroke-width="0.5"/>
    <!-- Hair shine -->
    <ellipse cx="18" cy="6" rx="3" ry="1.5" fill="#2a2a40" opacity="0.6"/>
    <!-- Eyes (narrow, refined) — shifted right -->
    <rect x="13" y="12.5" width="3.5" height="2" rx="1" fill="white"/>
    <rect x="18.5" y="12.5" width="3.5" height="2" rx="1" fill="white"/>
    <ellipse cx="15" cy="13.4" rx="1.1" ry="1" fill="#3a5a7a"/>
    <ellipse cx="20.5" cy="13.4" rx="1.1" ry="1" fill="#3a5a7a"/>
    <circle cx="14.5" cy="13.1" r="0.35" fill="white" opacity="0.5"/>
    <circle cx="20" cy="13.1" r="0.35" fill="white" opacity="0.5"/>
    <!-- Eyebrows (sharp, refined) -->
    <line x1="12.5" y1="11" x2="16.5" y2="10.5" stroke="#1a1a2e" stroke-width="0.9" stroke-linecap="round"/>
    <line x1="18" y1="10.5" x2="22" y2="11" stroke="#1a1a2e" stroke-width="0.9" stroke-linecap="round"/>
    <!-- Nose — straight line -->
    <line x1="16.5" y1="13" x2="16.5" y2="16" stroke="#e8c8b0" stroke-width="0.6" stroke-linecap="round"/>
    <!-- Mouth — subtle -->
    <line x1="14.5" y1="17.5" x2="18" y2="17.5" stroke="#c0a090" stroke-width="0.6" stroke-linecap="round"/>
    <!-- Jaw definition -->
    <line x1="8.5" y1="16" x2="10" y2="19" stroke="#e8cbb8" stroke-width="0.3" opacity="0.4"/>
    <line x1="23.5" y1="16" x2="22" y2="19" stroke="#e8cbb8" stroke-width="0.3" opacity="0.4"/>
  </g>

  <!-- ===== Dir 1 (down-left) ===== -->
  <g id="u1">
    <path d="M8,20 L24,20 L24,32 L8,32 Z" fill="url(#jacket)"/>
    <path d="M12,20 L16,24 L14,24 L10,20 Z" fill="#34495e"/>
    <path d="M20,20 L16,24 L18,24 L22,20 Z" fill="#34495e"/>
    <path d="M14,20 L16,24 L18,20 Z" fill="white"/>
    <path d="M15.5,24 L16,32 L16.5,24 Z" fill="#c0392b"/>
    <rect x="15" y="23.5" width="2" height="1.5" rx="0.3" fill="#c0392b"/>
    <path d="M20,22 L22,21 L22,23 Z" fill="white" opacity="0.7" transform="scale(-1,1) translate(-32,0)"/>
    <circle cx="16" cy="28" r="0.6" fill="#a0a0a0"/>
    <rect x="4" y="20" width="4.5" height="11" rx="1" fill="url(#jacket)"/>
    <rect x="23.5" y="20" width="4.5" height="11" rx="1" fill="url(#jacket)"/>
    <rect x="5" y="30.5" width="3" height="2.5" rx="1" fill="#fae3d0"/>
    <rect x="24" y="30.5" width="3" height="2.5" rx="1" fill="#fae3d0"/>
    <ellipse cx="16" cy="13" rx="7.5" ry="8.5" fill="#fae3d0"/>
    <path d="M8.5,11 Q9,6 16,5 Q23,6 23.5,11 L23,8 Q22,6 16,5.5 Q10,6 9,8 Z" fill="#1a1a2e"/>
    <ellipse cx="16" cy="7" rx="8" ry="4" fill="#1a1a2e"/>
    <line x1="20" y1="5.5" x2="21" y2="9" stroke="#2a2a40" stroke-width="0.5"/>
    <ellipse cx="14" cy="6" rx="3" ry="1.5" fill="#2a2a40" opacity="0.6"/>
    <!-- Eyes shifted left -->
    <rect x="10.5" y="12.5" width="3.5" height="2" rx="1" fill="white"/>
    <rect x="16" y="12.5" width="3.5" height="2" rx="1" fill="white"/>
    <ellipse cx="12.5" cy="13.4" rx="1.1" ry="1" fill="#3a5a7a"/>
    <ellipse cx="18" cy="13.4" rx="1.1" ry="1" fill="#3a5a7a"/>
    <circle cx="12" cy="13.1" r="0.35" fill="white" opacity="0.5"/>
    <circle cx="17.5" cy="13.1" r="0.35" fill="white" opacity="0.5"/>
    <line x1="10" y1="11" x2="14" y2="10.5" stroke="#1a1a2e" stroke-width="0.9" stroke-linecap="round"/>
    <line x1="15.5" y1="10.5" x2="19.5" y2="11" stroke="#1a1a2e" stroke-width="0.9" stroke-linecap="round"/>
    <line x1="15.5" y1="13" x2="15.5" y2="16" stroke="#e8c8b0" stroke-width="0.6" stroke-linecap="round"/>
    <line x1="14" y1="17.5" x2="17.5" y2="17.5" stroke="#c0a090" stroke-width="0.6" stroke-linecap="round"/>
  </g>

  <!-- ===== Dir 2 (up-left, back) ===== -->
  <g id="u2">
    <path d="M8,20 L24,20 L24,32 L8,32 Z" fill="url(#jacket)"/>
    <!-- Back seam -->
    <line x1="16" y1="20" x2="16" y2="32" stroke="#223040" stroke-width="0.4"/>
    <!-- Back vent -->
    <line x1="16" y1="28" x2="16" y2="32" stroke="#1a2530" stroke-width="0.8"/>
    <rect x="12" y="20" width="4" height="11" rx="1" fill="url(#jacket)"/>
    <rect x="13" y="30.5" width="3" height="2.5" rx="1" fill="#fae3d0"/>
    <ellipse cx="16" cy="13" rx="7.5" ry="8.5" fill="#fae3d0"/>
    <!-- Full back hair -->
    <ellipse cx="16" cy="10" rx="8" ry="8" fill="#1a1a2e"/>
    <ellipse cx="16" cy="7" rx="8" ry="5" fill="#1a1a2e"/>
    <ellipse cx="16" cy="6" rx="4" ry="2" fill="#2a2a40" opacity="0.5"/>
  </g>

  <!-- ===== Dir 3 (up-right, back) ===== -->
  <g id="u3">
    <path d="M8,20 L24,20 L24,32 L8,32 Z" fill="url(#jacket)"/>
    <line x1="16" y1="20" x2="16" y2="32" stroke="#223040" stroke-width="0.4"/>
    <line x1="16" y1="28" x2="16" y2="32" stroke="#1a2530" stroke-width="0.8"/>
    <rect x="16" y="20" width="4" height="11" rx="1" fill="url(#jacket)"/>
    <rect x="16" y="30.5" width="3" height="2.5" rx="1" fill="#fae3d0"/>
    <ellipse cx="16" cy="13" rx="7.5" ry="8.5" fill="#fae3d0"/>
    <ellipse cx="16" cy="10" rx="8" ry="8" fill="#1a1a2e"/>
    <ellipse cx="16" cy="7" rx="8" ry="5" fill="#1a1a2e"/>
    <ellipse cx="16" cy="6" rx="4" ry="2" fill="#2a2a40" opacity="0.5"/>
  </g>

  <!-- Legs neutral — tailored trousers + oxford shoes -->
  <g id="ln">
    <rect x="11" y="32" width="4" height="8" rx="0.5" fill="url(#pants)"/>
    <rect x="17" y="32" width="4" height="8" rx="0.5" fill="url(#pants)"/>
    <!-- Crease -->
    <line x1="13" y1="33" x2="13" y2="39" stroke="#344858" stroke-width="0.3" opacity="0.4"/>
    <line x1="19" y1="33" x2="19" y2="39" stroke="#344858" stroke-width="0.3" opacity="0.4"/>
    <!-- Shoes -->
    <rect x="10" y="39" width="5.5" height="3" rx="1.2" fill="#2c1810"/>
    <rect x="16.5" y="39" width="5.5" height="3" rx="1.2" fill="#2c1810"/>
    <!-- Shoe shine -->
    <ellipse cx="12.5" cy="39.5" rx="1.5" ry="0.5" fill="#4a3020" opacity="0.5"/>
    <ellipse cx="19" cy="39.5" rx="1.5" ry="0.5" fill="#4a3020" opacity="0.5"/>
  </g>
  <!-- Legs stride right -->
  <g id="lr">
    <rect x="11" y="32" width="4" height="11" rx="0.5" fill="url(#pants)"/>
    <rect x="17" y="32" width="4" height="5" rx="0.5" fill="url(#pants)"/>
    <rect x="10" y="42" width="5.5" height="3" rx="1.2" fill="#2c1810"/>
    <rect x="16.5" y="36" width="5.5" height="3" rx="1.2" fill="#2c1810"/>
  </g>
  <!-- Legs stride left -->
  <g id="ll">
    <rect x="11" y="32" width="4" height="5" rx="0.5" fill="url(#pants)"/>
    <rect x="17" y="32" width="4" height="11" rx="0.5" fill="url(#pants)"/>
    <rect x="10" y="36" width="5.5" height="3" rx="1.2" fill="#2c1810"/>
    <rect x="16.5" y="42" width="5.5" height="3" rx="1.2" fill="#2c1810"/>
  </g>
</defs>

<!-- Dir 0 row -->
<g transform="translate(0,0)"><use href="#sh"/><use href="#u0"/><use href="#ln"/></g>
<g transform="translate(32,0)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#u0"/><use href="#lr"/></g></g>
<g transform="translate(64,0)"><use href="#sh"/><use href="#u0"/><use href="#ln"/></g>
<g transform="translate(96,0)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#u0"/><use href="#ll"/></g></g>

<!-- Dir 1 row -->
<g transform="translate(0,48)"><use href="#sh"/><use href="#u1"/><use href="#ln"/></g>
<g transform="translate(32,48)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#u1"/><use href="#lr"/></g></g>
<g transform="translate(64,48)"><use href="#sh"/><use href="#u1"/><use href="#ln"/></g>
<g transform="translate(96,48)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#u1"/><use href="#ll"/></g></g>

<!-- Dir 2 row -->
<g transform="translate(0,96)"><use href="#sh"/><use href="#u2"/><use href="#ln"/></g>
<g transform="translate(32,96)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#u2"/><use href="#lr"/></g></g>
<g transform="translate(64,96)"><use href="#sh"/><use href="#u2"/><use href="#ln"/></g>
<g transform="translate(96,96)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#u2"/><use href="#ll"/></g></g>

<!-- Dir 3 row -->
<g transform="translate(0,144)"><use href="#sh"/><use href="#u3"/><use href="#ln"/></g>
<g transform="translate(32,144)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#u3"/><use href="#lr"/></g></g>
<g transform="translate(64,144)"><use href="#sh"/><use href="#u3"/><use href="#ln"/></g>
<g transform="translate(96,144)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#u3"/><use href="#ll"/></g></g>
</svg>
