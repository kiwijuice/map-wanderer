<svg xmlns="http://www.w3.org/2000/svg" width="128" height="192" viewBox="0 0 128 192">
<!-- Soft Cartoon Isometric Style — Artist Girl with Beret -->
<defs>
  <linearGradient id="blouse" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#e8b0d0"/>
    <stop offset="100%" stop-color="#d490b8"/>
  </linearGradient>
  <linearGradient id="skirt" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#8060a8"/>
    <stop offset="100%" stop-color="#6a4890"/>
  </linearGradient>

  <g id="sh"><ellipse cx="16" cy="44" rx="10" ry="4" fill="rgba(0,0,0,.18)"/></g>

  <!-- ===== Dir 0 (down-right) ===== -->
  <g id="u0">
    <!-- Blouse -->
    <rect x="9" y="20" width="14" height="10" rx="3" fill="url(#blouse)"/>
    <!-- Peter-Pan collar -->
    <path d="M12,20 Q10,22 12,23" fill="white" stroke="#ddd" stroke-width="0.3"/>
    <path d="M20,20 Q22,22 20,23" fill="white" stroke="#ddd" stroke-width="0.3"/>
    <!-- Tiny bow -->
    <path d="M14.5,20.5 L16,21.5 L17.5,20.5" fill="none" stroke="#c06088" stroke-width="0.6"/>
    <circle cx="16" cy="21.5" r="0.5" fill="#c06088"/>
    <!-- A-line skirt -->
    <path d="M9,30 L23,30 L25,38 L7,38 Z" fill="url(#skirt)"/>
    <path d="M7,37 L25,37 L25.2,38.2 L6.8,38.2 Z" fill="#5a3878" opacity="0.4"/>
    <!-- Skirt pleat hints -->
    <line x1="13" y1="30" x2="12" y2="38" stroke="#704898" stroke-width="0.3" opacity="0.5"/>
    <line x1="19" y1="30" x2="20" y2="38" stroke="#704898" stroke-width="0.3" opacity="0.5"/>
    <!-- Arms (skin, rounded) -->
    <rect x="5" y="21" width="4" height="8" rx="2" fill="#fce4d4"/>
    <rect x="23" y="21" width="4" height="8" rx="2" fill="#fce4d4"/>
    <circle cx="7" cy="30" r="1.8" fill="#fce4d4"/>
    <circle cx="25" cy="30" r="1.8" fill="#fce4d4"/>
    <!-- Head (big cartoon circle) -->
    <circle cx="16" cy="13" r="9" fill="#fce4d4"/>
    <!-- Cheeks (rosy) -->
    <circle cx="10" cy="15" r="2.5" fill="#f8b0a0" opacity="0.35"/>
    <circle cx="22" cy="15" r="2.5" fill="#f8b0a0" opacity="0.35"/>
    <!-- Hair — auburn with soft waves -->
    <ellipse cx="16" cy="8" rx="10" ry="6" fill="#a04030"/>
    <!-- Side bangs curving -->
    <path d="M6,10 Q5,16 7,20 Q9,22 10,18 L9,8 Z" fill="#a04030"/>
    <path d="M26,10 Q27,16 25,20 Q23,22 22,18 L23,8 Z" fill="#a04030"/>
    <!-- Hair highlight -->
    <ellipse cx="13" cy="6" rx="4" ry="2" fill="#c86050" opacity="0.5"/>
    <ellipse cx="20" cy="5.5" rx="2.5" ry="1.5" fill="#d87060" opacity="0.35"/>
    <!-- Beret! -->
    <ellipse cx="16" cy="5" rx="9" ry="3.5" fill="#c06088"/>
    <ellipse cx="16" cy="4" rx="7" ry="2.5" fill="#d070a0"/>
    <circle cx="16" cy="2" r="1.2" fill="#d070a0"/>
    <!-- Eyes (big, round, expressive) — shifted right -->
    <ellipse cx="14" cy="13" rx="2.4" ry="2.6" fill="white"/>
    <ellipse cx="20" cy="13" rx="2.4" ry="2.6" fill="white"/>
    <circle cx="15" cy="13.3" r="1.4" fill="#5080c0"/>
    <circle cx="21" cy="13.3" r="1.4" fill="#5080c0"/>
    <circle cx="14.3" cy="12.6" r="0.6" fill="white" opacity="0.7"/>
    <circle cx="20.3" cy="12.6" r="0.6" fill="white" opacity="0.7"/>
    <!-- Eyelashes (cute cartoon) -->
    <line x1="11.5" y1="10.8" x2="16" y2="10.4" stroke="#603830" stroke-width="0.7" stroke-linecap="round"/>
    <line x1="18" y1="10.4" x2="22.5" y2="10.8" stroke="#603830" stroke-width="0.7" stroke-linecap="round"/>
    <!-- Smile -->
    <path d="M14,16.5 Q16,18.2 18,16.5" fill="none" stroke="#c07070" stroke-width="0.8" stroke-linecap="round"/>
    <!-- Nose -->
    <circle cx="17" cy="14.8" r="0.5" fill="#e8c0b8"/>
  </g>

  <!-- ===== Dir 1 (down-left) ===== -->
  <g id="u1">
    <rect x="9" y="20" width="14" height="10" rx="3" fill="url(#blouse)"/>
    <path d="M12,20 Q10,22 12,23" fill="white" stroke="#ddd" stroke-width="0.3"/>
    <path d="M20,20 Q22,22 20,23" fill="white" stroke="#ddd" stroke-width="0.3"/>
    <path d="M14.5,20.5 L16,21.5 L17.5,20.5" fill="none" stroke="#c06088" stroke-width="0.6"/>
    <circle cx="16" cy="21.5" r="0.5" fill="#c06088"/>
    <path d="M9,30 L23,30 L25,38 L7,38 Z" fill="url(#skirt)"/>
    <path d="M7,37 L25,37 L25.2,38.2 L6.8,38.2 Z" fill="#5a3878" opacity="0.4"/>
    <line x1="13" y1="30" x2="12" y2="38" stroke="#704898" stroke-width="0.3" opacity="0.5"/>
    <line x1="19" y1="30" x2="20" y2="38" stroke="#704898" stroke-width="0.3" opacity="0.5"/>
    <rect x="5" y="21" width="4" height="8" rx="2" fill="#fce4d4"/>
    <rect x="23" y="21" width="4" height="8" rx="2" fill="#fce4d4"/>
    <circle cx="7" cy="30" r="1.8" fill="#fce4d4"/>
    <circle cx="25" cy="30" r="1.8" fill="#fce4d4"/>
    <circle cx="16" cy="13" r="9" fill="#fce4d4"/>
    <circle cx="10" cy="15" r="2.5" fill="#f8b0a0" opacity="0.35"/>
    <circle cx="22" cy="15" r="2.5" fill="#f8b0a0" opacity="0.35"/>
    <ellipse cx="16" cy="8" rx="10" ry="6" fill="#a04030"/>
    <path d="M6,10 Q5,16 7,20 Q9,22 10,18 L9,8 Z" fill="#a04030"/>
    <path d="M26,10 Q27,16 25,20 Q23,22 22,18 L23,8 Z" fill="#a04030"/>
    <ellipse cx="19" cy="6" rx="4" ry="2" fill="#c86050" opacity="0.5"/>
    <ellipse cx="12" cy="5.5" rx="2.5" ry="1.5" fill="#d87060" opacity="0.35"/>
    <ellipse cx="16" cy="5" rx="9" ry="3.5" fill="#c06088"/>
    <ellipse cx="16" cy="4" rx="7" ry="2.5" fill="#d070a0"/>
    <circle cx="16" cy="2" r="1.2" fill="#d070a0"/>
    <!-- Eyes shifted left -->
    <ellipse cx="12" cy="13" rx="2.4" ry="2.6" fill="white"/>
    <ellipse cx="18" cy="13" rx="2.4" ry="2.6" fill="white"/>
    <circle cx="11.5" cy="13.3" r="1.4" fill="#5080c0"/>
    <circle cx="17.5" cy="13.3" r="1.4" fill="#5080c0"/>
    <circle cx="12.3" cy="12.6" r="0.6" fill="white" opacity="0.7"/>
    <circle cx="18.3" cy="12.6" r="0.6" fill="white" opacity="0.7"/>
    <line x1="9.5" y1="10.8" x2="14" y2="10.4" stroke="#603830" stroke-width="0.7" stroke-linecap="round"/>
    <line x1="16" y1="10.4" x2="20.5" y2="10.8" stroke="#603830" stroke-width="0.7" stroke-linecap="round"/>
    <path d="M14,16.5 Q16,18.2 18,16.5" fill="none" stroke="#c07070" stroke-width="0.8" stroke-linecap="round"/>
    <circle cx="15" cy="14.8" r="0.5" fill="#e8c0b8"/>
  </g>

  <!-- ===== Dir 2 (up-left, back) ===== -->
  <g id="u2">
    <rect x="9" y="20" width="14" height="10" rx="3" fill="url(#blouse)"/>
    <path d="M9,30 L23,30 L25,38 L7,38 Z" fill="url(#skirt)"/>
    <rect x="12" y="21" width="4" height="8" rx="2" fill="#fce4d4"/>
    <circle cx="14" cy="30" r="1.8" fill="#fce4d4"/>
    <circle cx="16" cy="13" r="9" fill="#fce4d4"/>
    <!-- Full back hair -->
    <ellipse cx="16" cy="11" rx="10" ry="9" fill="#a04030"/>
    <!-- Long flowing hair -->
    <path d="M6,12 Q5,22 10,28 Q13,30 16,29 Q19,30 22,28 Q27,22 26,12 Z" fill="#a04030"/>
    <path d="M9,14 Q10,24 13,27" fill="none" stroke="#c86050" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
    <path d="M23,14 Q22,24 19,27" fill="none" stroke="#c86050" stroke-width="0.8" opacity="0.35" stroke-linecap="round"/>
    <!-- Beret back -->
    <ellipse cx="16" cy="5" rx="9" ry="3.5" fill="#c06088"/>
    <ellipse cx="16" cy="4" rx="7" ry="2.5" fill="#d070a0"/>
    <circle cx="16" cy="2" r="1.2" fill="#d070a0"/>
  </g>

  <!-- ===== Dir 3 (up-right, back) ===== -->
  <g id="u3">
    <rect x="9" y="20" width="14" height="10" rx="3" fill="url(#blouse)"/>
    <path d="M9,30 L23,30 L25,38 L7,38 Z" fill="url(#skirt)"/>
    <rect x="16" y="21" width="4" height="8" rx="2" fill="#fce4d4"/>
    <circle cx="18" cy="30" r="1.8" fill="#fce4d4"/>
    <circle cx="16" cy="13" r="9" fill="#fce4d4"/>
    <ellipse cx="16" cy="11" rx="10" ry="9" fill="#a04030"/>
    <path d="M6,12 Q5,22 10,28 Q13,30 16,29 Q19,30 22,28 Q27,22 26,12 Z" fill="#a04030"/>
    <path d="M9,14 Q10,24 13,27" fill="none" stroke="#c86050" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
    <path d="M23,14 Q22,24 19,27" fill="none" stroke="#c86050" stroke-width="0.8" opacity="0.35" stroke-linecap="round"/>
    <ellipse cx="16" cy="5" rx="9" ry="3.5" fill="#c06088"/>
    <ellipse cx="16" cy="4" rx="7" ry="2.5" fill="#d070a0"/>
    <circle cx="16" cy="2" r="1.2" fill="#d070a0"/>
  </g>

  <!-- Legs neutral — tights + ballet flats -->
  <g id="ln">
    <rect x="12" y="38" width="3" height="4" rx="0.5" fill="#fce4d4"/>
    <rect x="17" y="38" width="3" height="4" rx="0.5" fill="#fce4d4"/>
    <ellipse cx="13.5" cy="42.5" rx="2.5" ry="1.5" fill="#8060a8"/>
    <ellipse cx="18.5" cy="42.5" rx="2.5" ry="1.5" fill="#8060a8"/>
  </g>
  <!-- Legs stride right -->
  <g id="lr">
    <rect x="12" y="38" width="3" height="7" rx="0.5" fill="#fce4d4"/>
    <rect x="17" y="38" width="3" height="1" rx="0.5" fill="#fce4d4"/>
    <ellipse cx="13.5" cy="45.5" rx="2.5" ry="1.5" fill="#8060a8"/>
    <ellipse cx="18.5" cy="39.5" rx="2.5" ry="1.5" fill="#8060a8"/>
  </g>
  <!-- Legs stride left -->
  <g id="ll">
    <rect x="12" y="38" width="3" height="1" rx="0.5" fill="#fce4d4"/>
    <rect x="17" y="38" width="3" height="7" rx="0.5" fill="#fce4d4"/>
    <ellipse cx="13.5" cy="39.5" rx="2.5" ry="1.5" fill="#8060a8"/>
    <ellipse cx="18.5" cy="45.5" rx="2.5" ry="1.5" fill="#8060a8"/>
  </g>
</defs>

<!-- Dir 0 row -->
<g transform="translate(0,0)"><use href="#sh"/><use href="#u0"/><use href="#ln"/></g>
<g transform="translate(32,0)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#u0"/><use href="#lr"/></g></g>
<g transform="translate(64,0)"><use href="#sh"/><use href="#u0"/><use href="#ln"/></g>
<g transform="translate(96,0)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#u0"/><use href="#ll"/></g></g>

<!-- Dir 1 row -->
<g transform="translate(0,48)"><use href="#sh"/><use href="#u1"/><use href="#ln"/></g>
<g transform="translate(32,48)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#u1"/><use href="#lr"/></g></g>
<g transform="translate(64,48)"><use href="#sh"/><use href="#u1"/><use href="#ln"/></g>
<g transform="translate(96,48)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#u1"/><use href="#ll"/></g></g>

<!-- Dir 2 row -->
<g transform="translate(0,96)"><use href="#sh"/><use href="#u2"/><use href="#ln"/></g>
<g transform="translate(32,96)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#u2"/><use href="#lr"/></g></g>
<g transform="translate(64,96)"><use href="#sh"/><use href="#u2"/><use href="#ln"/></g>
<g transform="translate(96,96)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#u2"/><use href="#ll"/></g></g>

<!-- Dir 3 row -->
<g transform="translate(0,144)"><use href="#sh"/><use href="#u3"/><use href="#ln"/></g>
<g transform="translate(32,144)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#u3"/><use href="#lr"/></g></g>
<g transform="translate(64,144)"><use href="#sh"/><use href="#u3"/><use href="#ln"/></g>
<g transform="translate(96,144)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#u3"/><use href="#ll"/></g></g>
</svg>
