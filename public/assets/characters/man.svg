<svg xmlns="http://www.w3.org/2000/svg" width="128" height="192" viewBox="0 0 128 192">
<defs>
  <!-- Shadow -->
  <g id="sh"><ellipse cx="16" cy="44" rx="10" ry="4" fill="rgba(0,0,0,.2)"/></g>

  <!-- ===== Direction 0 upper (down-right) ===== -->
  <g id="mu0">
    <!-- Torso -->
    <rect x="9" y="20" width="14" height="12" rx="1" fill="#3465a4"/>
    <!-- Shirt collar hint -->
    <rect x="12" y="19" width="8" height="2" rx="1" fill="#e8e8e8"/>
    <!-- Arms -->
    <rect x="6" y="21" width="4" height="10" rx="1" fill="#3465a4"/>
    <rect x="22" y="21" width="4" height="10" rx="1" fill="#3465a4"/>
    <!-- Hands -->
    <rect x="7" y="30" width="3" height="3" rx="1" fill="#f4c68a"/>
    <rect x="22" y="30" width="3" height="3" rx="1" fill="#f4c68a"/>
    <!-- Head -->
    <ellipse cx="16" cy="14" rx="8" ry="9" fill="#f4c68a"/>
    <!-- Hair top -->
    <ellipse cx="16" cy="10" rx="9" ry="5" fill="#4a3222"/>
    <!-- Hair sides -->
    <rect x="7" y="9" width="3" height="6" rx="1" fill="#4a3222"/>
    <rect x="22" y="9" width="3" height="6" rx="1" fill="#4a3222"/>
    <!-- Eyes (shifted right for dir 0) -->
    <rect x="15" y="13" width="2" height="2" rx="0.5" fill="#333"/>
    <rect x="20" y="13" width="2" height="2" rx="0.5" fill="#333"/>
    <!-- Mouth -->
    <rect x="16" y="17" width="4" height="1" rx="0.5" fill="#333"/>
  </g>

  <!-- ===== Direction 1 upper (down-left) ===== -->
  <g id="mu1">
    <rect x="9" y="20" width="14" height="12" rx="1" fill="#3465a4"/>
    <rect x="12" y="19" width="8" height="2" rx="1" fill="#e8e8e8"/>
    <rect x="6" y="21" width="4" height="10" rx="1" fill="#3465a4"/>
    <rect x="22" y="21" width="4" height="10" rx="1" fill="#3465a4"/>
    <rect x="7" y="30" width="3" height="3" rx="1" fill="#f4c68a"/>
    <rect x="22" y="30" width="3" height="3" rx="1" fill="#f4c68a"/>
    <ellipse cx="16" cy="14" rx="8" ry="9" fill="#f4c68a"/>
    <ellipse cx="16" cy="10" rx="9" ry="5" fill="#4a3222"/>
    <rect x="7" y="9" width="3" height="6" rx="1" fill="#4a3222"/>
    <rect x="22" y="9" width="3" height="6" rx="1" fill="#4a3222"/>
    <!-- Eyes (shifted left for dir 1) -->
    <rect x="11" y="13" width="2" height="2" rx="0.5" fill="#333"/>
    <rect x="16" y="13" width="2" height="2" rx="0.5" fill="#333"/>
    <rect x="12" y="17" width="4" height="1" rx="0.5" fill="#333"/>
  </g>

  <!-- ===== Direction 2 upper (up-left, back view) ===== -->
  <g id="mu2">
    <rect x="9" y="20" width="14" height="12" rx="1" fill="#3465a4"/>
    <!-- Single arm -->
    <rect x="12" y="21" width="4" height="10" rx="1" fill="#3465a4"/>
    <rect x="13" y="30" width="3" height="3" rx="1" fill="#f4c68a"/>
    <ellipse cx="16" cy="14" rx="8" ry="9" fill="#f4c68a"/>
    <!-- Full back hair -->
    <ellipse cx="16" cy="12" rx="9" ry="8" fill="#4a3222"/>
  </g>

  <!-- ===== Direction 3 upper (up-right, back view) ===== -->
  <g id="mu3">
    <rect x="9" y="20" width="14" height="12" rx="1" fill="#3465a4"/>
    <rect x="16" y="21" width="4" height="10" rx="1" fill="#3465a4"/>
    <rect x="17" y="30" width="3" height="3" rx="1" fill="#f4c68a"/>
    <ellipse cx="16" cy="14" rx="8" ry="9" fill="#f4c68a"/>
    <ellipse cx="16" cy="12" rx="9" ry="8" fill="#4a3222"/>
  </g>

  <!-- ===== Legs neutral ===== -->
  <g id="ln">
    <rect x="11" y="32" width="4" height="8" fill="#555"/>
    <rect x="17" y="32" width="4" height="8" fill="#555"/>
    <rect x="10" y="39" width="5" height="3" rx="1" fill="#333"/>
    <rect x="17" y="39" width="5" height="3" rx="1" fill="#333"/>
  </g>

  <!-- ===== Legs stride right (legOffset=3) ===== -->
  <g id="lr">
    <rect x="11" y="32" width="4" height="11" fill="#555"/>
    <rect x="17" y="32" width="4" height="5" fill="#555"/>
    <rect x="10" y="42" width="5" height="3" rx="1" fill="#333"/>
    <rect x="17" y="36" width="5" height="3" rx="1" fill="#333"/>
  </g>

  <!-- ===== Legs stride left (legOffset=-3) ===== -->
  <g id="ll">
    <rect x="11" y="32" width="4" height="5" fill="#555"/>
    <rect x="17" y="32" width="4" height="11" fill="#555"/>
    <rect x="10" y="36" width="5" height="3" rx="1" fill="#333"/>
    <rect x="17" y="42" width="5" height="3" rx="1" fill="#333"/>
  </g>
</defs>

<!-- ===== Dir 0 (down-right) row y=0 ===== -->
<g transform="translate(0,0)"><use href="#sh"/><use href="#mu0"/><use href="#ln"/></g>
<g transform="translate(32,0)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#mu0"/><use href="#lr"/></g></g>
<g transform="translate(64,0)"><use href="#sh"/><use href="#mu0"/><use href="#ln"/></g>
<g transform="translate(96,0)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#mu0"/><use href="#ll"/></g></g>

<!-- ===== Dir 1 (down-left) row y=48 ===== -->
<g transform="translate(0,48)"><use href="#sh"/><use href="#mu1"/><use href="#ln"/></g>
<g transform="translate(32,48)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#mu1"/><use href="#lr"/></g></g>
<g transform="translate(64,48)"><use href="#sh"/><use href="#mu1"/><use href="#ln"/></g>
<g transform="translate(96,48)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#mu1"/><use href="#ll"/></g></g>

<!-- ===== Dir 2 (up-left) row y=96 ===== -->
<g transform="translate(0,96)"><use href="#sh"/><use href="#mu2"/><use href="#ln"/></g>
<g transform="translate(32,96)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#mu2"/><use href="#lr"/></g></g>
<g transform="translate(64,96)"><use href="#sh"/><use href="#mu2"/><use href="#ln"/></g>
<g transform="translate(96,96)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#mu2"/><use href="#ll"/></g></g>

<!-- ===== Dir 3 (up-right) row y=144 ===== -->
<g transform="translate(0,144)"><use href="#sh"/><use href="#mu3"/><use href="#ln"/></g>
<g transform="translate(32,144)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#mu3"/><use href="#lr"/></g></g>
<g transform="translate(64,144)"><use href="#sh"/><use href="#mu3"/><use href="#ln"/></g>
<g transform="translate(96,144)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#mu3"/><use href="#ll"/></g></g>
</svg>
