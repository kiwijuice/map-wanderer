<svg xmlns="http://www.w3.org/2000/svg" width="128" height="192" viewBox="0 0 128 192">
<!-- Elegant Minimal Style — Chic Professional Woman -->
<defs>
  <linearGradient id="coat" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#d4a07a"/>
    <stop offset="100%" stop-color="#c08a60"/>
  </linearGradient>
  <linearGradient id="pencilsk" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#2c3e50"/>
    <stop offset="100%" stop-color="#1c2830"/>
  </linearGradient>

  <g id="sh"><ellipse cx="16" cy="44" rx="10" ry="4" fill="rgba(0,0,0,.2)"/></g>

  <!-- ===== Dir 0 (down-right) ===== -->
  <g id="u0">
    <!-- Coat body -->
    <path d="M8,20 L24,20 L24,30 L8,30 Z" fill="url(#coat)"/>
    <!-- Lapel V -->
    <path d="M13,20 L16,24 L15,24 L11,20 Z" fill="#dab090"/>
    <path d="M19,20 L16,24 L17,24 L21,20 Z" fill="#dab090"/>
    <!-- White blouse peek -->
    <path d="M15,20 L16,23 L17,20 Z" fill="white"/>
    <!-- Coat button -->
    <circle cx="16" cy="26" r="0.5" fill="#a08060"/>
    <!-- Pencil skirt -->
    <path d="M9,30 L23,30 L22,38 L10,38 Z" fill="url(#pencilsk)"/>
    <line x1="16" y1="30" x2="16" y2="38" stroke="#344858" stroke-width="0.3" opacity="0.4"/>
    <!-- Arms (coat sleeves) -->
    <rect x="4" y="20" width="4.5" height="10" rx="1" fill="url(#coat)"/>
    <rect x="23.5" y="20" width="4.5" height="10" rx="1" fill="url(#coat)"/>
    <!-- Hands -->
    <rect x="5" y="29.5" width="3" height="2.5" rx="1" fill="#fae3d0"/>
    <rect x="24" y="29.5" width="3" height="2.5" rx="1" fill="#fae3d0"/>
    <!-- Head -->
    <ellipse cx="16" cy="13" rx="7.5" ry="8.5" fill="#fae3d0"/>
    <!-- Hair — sleek platinum blonde bob -->
    <ellipse cx="16" cy="8" rx="8.5" ry="5.5" fill="#e8d4a0"/>
    <!-- Side hair -->
    <path d="M7.5,10 Q7,15 8.5,19 L10,19 Q9,15 9.5,10 Z" fill="#e8d4a0"/>
    <path d="M24.5,10 Q25,15 23.5,19 L22,19 Q23,15 22.5,10 Z" fill="#e8d4a0"/>
    <!-- Hair shine -->
    <ellipse cx="14" cy="6.5" rx="4" ry="1.5" fill="#f0e0b0" opacity="0.6"/>
    <ellipse cx="19" cy="6" rx="2" ry="1" fill="#f5eac0" opacity="0.4"/>
    <!-- Eyes (almond shaped, elegant) — shifted right -->
    <ellipse cx="13.5" cy="13" rx="2.5" ry="1.5" fill="white"/>
    <ellipse cx="20" cy="13" rx="2.5" ry="1.5" fill="white"/>
    <ellipse cx="14" cy="13" rx="1.2" ry="1.2" fill="#5a7a5a"/>
    <ellipse cx="20.5" cy="13" rx="1.2" ry="1.2" fill="#5a7a5a"/>
    <circle cx="13.5" cy="12.7" r="0.35" fill="white" opacity="0.5"/>
    <circle cx="20" cy="12.7" r="0.35" fill="white" opacity="0.5"/>
    <!-- Eyeliner -->
    <path d="M11,12.5 Q13.5,11.5 16,12.5" fill="none" stroke="#3a3a3a" stroke-width="0.5"/>
    <path d="M17.5,12.5 Q20,11.5 22.5,12.5" fill="none" stroke="#3a3a3a" stroke-width="0.5"/>
    <!-- Eyebrows (arched, elegant) -->
    <path d="M11.5,10.5 Q13.5,9.5 16,10.5" fill="none" stroke="#c0a880" stroke-width="0.7" stroke-linecap="round"/>
    <path d="M17.5,10.5 Q20,9.5 22,10.5" fill="none" stroke="#c0a880" stroke-width="0.7" stroke-linecap="round"/>
    <!-- Nose — delicate -->
    <path d="M16.5,13.5 L16.2,15.5 Q16,16 16.5,16" fill="none" stroke="#e0c0a8" stroke-width="0.5" stroke-linecap="round"/>
    <!-- Lips — refined, berry -->
    <ellipse cx="16.5" cy="17.5" rx="2.2" ry="0.9" fill="#b04060"/>
    <ellipse cx="16.5" cy="17.2" rx="1.2" ry="0.4" fill="#c85070" opacity="0.5"/>
    <!-- Earrings — pearl drop -->
    <circle cx="7.5" cy="17" r="0.8" fill="#f0e8d0"/>
    <circle cx="7.5" cy="17" r="0.4" fill="white" opacity="0.4"/>
    <circle cx="24.5" cy="17" r="0.8" fill="#f0e8d0"/>
    <circle cx="24.5" cy="17" r="0.4" fill="white" opacity="0.4"/>
  </g>

  <!-- ===== Dir 1 (down-left) ===== -->
  <g id="u1">
    <path d="M8,20 L24,20 L24,30 L8,30 Z" fill="url(#coat)"/>
    <path d="M13,20 L16,24 L15,24 L11,20 Z" fill="#dab090"/>
    <path d="M19,20 L16,24 L17,24 L21,20 Z" fill="#dab090"/>
    <path d="M15,20 L16,23 L17,20 Z" fill="white"/>
    <circle cx="16" cy="26" r="0.5" fill="#a08060"/>
    <path d="M9,30 L23,30 L22,38 L10,38 Z" fill="url(#pencilsk)"/>
    <line x1="16" y1="30" x2="16" y2="38" stroke="#344858" stroke-width="0.3" opacity="0.4"/>
    <rect x="4" y="20" width="4.5" height="10" rx="1" fill="url(#coat)"/>
    <rect x="23.5" y="20" width="4.5" height="10" rx="1" fill="url(#coat)"/>
    <rect x="5" y="29.5" width="3" height="2.5" rx="1" fill="#fae3d0"/>
    <rect x="24" y="29.5" width="3" height="2.5" rx="1" fill="#fae3d0"/>
    <ellipse cx="16" cy="13" rx="7.5" ry="8.5" fill="#fae3d0"/>
    <ellipse cx="16" cy="8" rx="8.5" ry="5.5" fill="#e8d4a0"/>
    <path d="M7.5,10 Q7,15 8.5,19 L10,19 Q9,15 9.5,10 Z" fill="#e8d4a0"/>
    <path d="M24.5,10 Q25,15 23.5,19 L22,19 Q23,15 22.5,10 Z" fill="#e8d4a0"/>
    <ellipse cx="18" cy="6.5" rx="4" ry="1.5" fill="#f0e0b0" opacity="0.6"/>
    <!-- Eyes shifted left -->
    <ellipse cx="12" cy="13" rx="2.5" ry="1.5" fill="white"/>
    <ellipse cx="18.5" cy="13" rx="2.5" ry="1.5" fill="white"/>
    <ellipse cx="11.5" cy="13" rx="1.2" ry="1.2" fill="#5a7a5a"/>
    <ellipse cx="18" cy="13" rx="1.2" ry="1.2" fill="#5a7a5a"/>
    <circle cx="12" cy="12.7" r="0.35" fill="white" opacity="0.5"/>
    <circle cx="18.5" cy="12.7" r="0.35" fill="white" opacity="0.5"/>
    <path d="M9.5,12.5 Q12,11.5 14.5,12.5" fill="none" stroke="#3a3a3a" stroke-width="0.5"/>
    <path d="M16,12.5 Q18.5,11.5 21,12.5" fill="none" stroke="#3a3a3a" stroke-width="0.5"/>
    <path d="M10,10.5 Q12,9.5 14.5,10.5" fill="none" stroke="#c0a880" stroke-width="0.7" stroke-linecap="round"/>
    <path d="M16,10.5 Q18.5,9.5 21,10.5" fill="none" stroke="#c0a880" stroke-width="0.7" stroke-linecap="round"/>
    <path d="M15.5,13.5 L15.2,15.5 Q15,16 15.5,16" fill="none" stroke="#e0c0a8" stroke-width="0.5" stroke-linecap="round"/>
    <ellipse cx="15.5" cy="17.5" rx="2.2" ry="0.9" fill="#b04060"/>
    <ellipse cx="15.5" cy="17.2" rx="1.2" ry="0.4" fill="#c85070" opacity="0.5"/>
    <circle cx="7.5" cy="17" r="0.8" fill="#f0e8d0"/>
    <circle cx="24.5" cy="17" r="0.8" fill="#f0e8d0"/>
  </g>

  <!-- ===== Dir 2 (up-left, back) ===== -->
  <g id="u2">
    <path d="M8,20 L24,20 L24,30 L8,30 Z" fill="url(#coat)"/>
    <line x1="16" y1="20" x2="16" y2="30" stroke="#c8986a" stroke-width="0.3" opacity="0.4"/>
    <path d="M9,30 L23,30 L22,38 L10,38 Z" fill="url(#pencilsk)"/>
    <rect x="12" y="20" width="4" height="10" rx="1" fill="url(#coat)"/>
    <rect x="13" y="29.5" width="3" height="2.5" rx="1" fill="#fae3d0"/>
    <ellipse cx="16" cy="13" rx="7.5" ry="8.5" fill="#fae3d0"/>
    <!-- Back hair bob -->
    <ellipse cx="16" cy="10" rx="9" ry="8" fill="#e8d4a0"/>
    <ellipse cx="16" cy="7" rx="8.5" ry="5.5" fill="#e8d4a0"/>
    <!-- Bob nape -->
    <path d="M9,14 Q10,18 16,19 Q22,18 23,14" fill="none" stroke="#d8c498" stroke-width="0.8" opacity="0.5"/>
    <ellipse cx="16" cy="6" rx="4" ry="1.5" fill="#f0e0b0" opacity="0.5"/>
  </g>

  <!-- ===== Dir 3 (up-right, back) ===== -->
  <g id="u3">
    <path d="M8,20 L24,20 L24,30 L8,30 Z" fill="url(#coat)"/>
    <line x1="16" y1="20" x2="16" y2="30" stroke="#c8986a" stroke-width="0.3" opacity="0.4"/>
    <path d="M9,30 L23,30 L22,38 L10,38 Z" fill="url(#pencilsk)"/>
    <rect x="16" y="20" width="4" height="10" rx="1" fill="url(#coat)"/>
    <rect x="16" y="29.5" width="3" height="2.5" rx="1" fill="#fae3d0"/>
    <ellipse cx="16" cy="13" rx="7.5" ry="8.5" fill="#fae3d0"/>
    <ellipse cx="16" cy="10" rx="9" ry="8" fill="#e8d4a0"/>
    <ellipse cx="16" cy="7" rx="8.5" ry="5.5" fill="#e8d4a0"/>
    <path d="M9,14 Q10,18 16,19 Q22,18 23,14" fill="none" stroke="#d8c498" stroke-width="0.8" opacity="0.5"/>
    <ellipse cx="16" cy="6" rx="4" ry="1.5" fill="#f0e0b0" opacity="0.5"/>
  </g>

  <!-- Legs neutral — skin + pointed heels -->
  <g id="ln">
    <rect x="12" y="38" width="3" height="4" rx="0.5" fill="#fae3d0"/>
    <rect x="17" y="38" width="3" height="4" rx="0.5" fill="#fae3d0"/>
    <!-- Pointed heels -->
    <path d="M11,42 L15.5,42 L14,43.5 L11.5,43.5 Z" fill="#2c1810"/>
    <path d="M16.5,42 L21,42 L20.5,43.5 L17,43.5 Z" fill="#2c1810"/>
    <rect x="11.5" y="43" width="1" height="1.5" rx="0.3" fill="#2c1810"/>
    <rect x="19.5" y="43" width="1" height="1.5" rx="0.3" fill="#2c1810"/>
  </g>
  <!-- Legs stride right -->
  <g id="lr">
    <rect x="12" y="38" width="3" height="7" rx="0.5" fill="#fae3d0"/>
    <rect x="17" y="38" width="3" height="1" rx="0.5" fill="#fae3d0"/>
    <path d="M11,45 L15.5,45 L14,46.5 L11.5,46.5 Z" fill="#2c1810"/>
    <path d="M16.5,39 L21,39 L20.5,40.5 L17,40.5 Z" fill="#2c1810"/>
    <rect x="11.5" y="46" width="1" height="1.5" rx="0.3" fill="#2c1810"/>
    <rect x="19.5" y="40" width="1" height="1.5" rx="0.3" fill="#2c1810"/>
  </g>
  <!-- Legs stride left -->
  <g id="ll">
    <rect x="12" y="38" width="3" height="1" rx="0.5" fill="#fae3d0"/>
    <rect x="17" y="38" width="3" height="7" rx="0.5" fill="#fae3d0"/>
    <path d="M11,39 L15.5,39 L14,40.5 L11.5,40.5 Z" fill="#2c1810"/>
    <path d="M16.5,45 L21,45 L20.5,46.5 L17,46.5 Z" fill="#2c1810"/>
    <rect x="11.5" y="40" width="1" height="1.5" rx="0.3" fill="#2c1810"/>
    <rect x="19.5" y="46" width="1" height="1.5" rx="0.3" fill="#2c1810"/>
  </g>
</defs>

<!-- Dir 0 row -->
<g transform="translate(0,0)"><use href="#sh"/><use href="#u0"/><use href="#ln"/></g>
<g transform="translate(32,0)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#u0"/><use href="#lr"/></g></g>
<g transform="translate(64,0)"><use href="#sh"/><use href="#u0"/><use href="#ln"/></g>
<g transform="translate(96,0)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#u0"/><use href="#ll"/></g></g>

<!-- Dir 1 row -->
<g transform="translate(0,48)"><use href="#sh"/><use href="#u1"/><use href="#ln"/></g>
<g transform="translate(32,48)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#u1"/><use href="#lr"/></g></g>
<g transform="translate(64,48)"><use href="#sh"/><use href="#u1"/><use href="#ln"/></g>
<g transform="translate(96,48)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#u1"/><use href="#ll"/></g></g>

<!-- Dir 2 row -->
<g transform="translate(0,96)"><use href="#sh"/><use href="#u2"/><use href="#ln"/></g>
<g transform="translate(32,96)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#u2"/><use href="#lr"/></g></g>
<g transform="translate(64,96)"><use href="#sh"/><use href="#u2"/><use href="#ln"/></g>
<g transform="translate(96,96)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#u2"/><use href="#ll"/></g></g>

<!-- Dir 3 row -->
<g transform="translate(0,144)"><use href="#sh"/><use href="#u3"/><use href="#ln"/></g>
<g transform="translate(32,144)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#u3"/><use href="#lr"/></g></g>
<g transform="translate(64,144)"><use href="#sh"/><use href="#u3"/><use href="#ln"/></g>
<g transform="translate(96,144)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#u3"/><use href="#ll"/></g></g>
</svg>
