<svg xmlns="http://www.w3.org/2000/svg" width="128" height="192" viewBox="0 0 128 192">
<defs>
  <!-- Dress gradient: deep emerald to bright teal -->
  <linearGradient id="dress" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0a6847"/>
    <stop offset="100%" stop-color="#16a085"/>
  </linearGradient>

  <!-- Shadow -->
  <g id="sh"><ellipse cx="16" cy="44" rx="10" ry="4" fill="rgba(0,0,0,.2)"/></g>

  <!-- ===== Direction 0 upper (down-right) ===== -->
  <g id="wu0">
    <!-- Dress A-line -->
    <path d="M9,20 L23,20 L25,34 L7,34 Z" fill="url(#dress)"/>
    <!-- Dress hem accent -->
    <path d="M7,33 L25,33 L25.2,34.2 L6.8,34.2 Z" fill="#12876a" opacity="0.5"/>
    <!-- Dress side shading -->
    <path d="M9,20 L12,20 L10,34 L7,34 Z" fill="#085a3a" opacity="0.25"/>
    <!-- Gold belt -->
    <rect x="8" y="25" width="16" height="2" rx="1" fill="#d4a017"/>
    <line x1="8" y1="25.4" x2="24" y2="25.4" stroke="#f0c040" stroke-width="0.5" opacity="0.6"/>
    <!-- Belt buckle -->
    <rect x="15" y="24.5" width="3" height="3" rx="0.5" fill="#f0c040"/>
    <rect x="15.8" y="25.2" width="1.4" height="1.6" rx="0.3" fill="#d4a017"/>
    <!-- Arms (skin) -->
    <rect x="5" y="21" width="3.5" height="10" rx="1.5" fill="#f0be8a"/>
    <rect x="23.5" y="21" width="3.5" height="10" rx="1.5" fill="#f0be8a"/>
    <!-- Head -->
    <ellipse cx="16" cy="14" rx="8" ry="9" fill="#f0be8a"/>
    <!-- Subtle blush -->
    <circle cx="13" cy="16" r="2.2" fill="#e8a090" opacity="0.2"/>
    <circle cx="21.5" cy="16" r="2.2" fill="#e8a090" opacity="0.2"/>
    <!-- Hair top sweep -->
    <ellipse cx="16" cy="9" rx="10" ry="6" fill="#5c2018"/>
    <!-- Left flowing lock -->
    <path d="M6,9 Q4.5,17 7,24 Q8.5,25.5 9.5,23 L9,9 Z" fill="#5c2018"/>
    <!-- Right flowing lock -->
    <path d="M26,9 Q27.5,17 25,24 Q23.5,25.5 22.5,23 L23,9 Z" fill="#5c2018"/>
    <!-- Hair highlight layer -->
    <ellipse cx="13" cy="7.5" rx="5" ry="3" fill="#8b3d20" opacity="0.6"/>
    <ellipse cx="19" cy="7" rx="3" ry="2" fill="#c87a4a" opacity="0.35"/>
    <!-- Golden sheen -->
    <ellipse cx="15" cy="6" rx="4" ry="1.5" fill="#d4a040" opacity="0.15"/>
    <!-- Eyes (teal, shifted right) -->
    <ellipse cx="15" cy="13.5" rx="1.8" ry="1.5" fill="#2a8b8b"/>
    <ellipse cx="21" cy="13.5" rx="1.8" ry="1.5" fill="#2a8b8b"/>
    <!-- Pupils -->
    <circle cx="15.5" cy="13.5" r="0.7" fill="#1a3a3a"/>
    <circle cx="21.5" cy="13.5" r="0.7" fill="#1a3a3a"/>
    <!-- Eye gleam -->
    <circle cx="14.5" cy="13" r="0.4" fill="white" opacity="0.6"/>
    <circle cx="20.5" cy="13" r="0.4" fill="white" opacity="0.6"/>
    <!-- Eyelashes -->
    <line x1="13" y1="11.8" x2="17.2" y2="11.8" stroke="#2d2d2d" stroke-width="0.7"/>
    <line x1="19" y1="11.8" x2="23.2" y2="11.8" stroke="#2d2d2d" stroke-width="0.7"/>
    <!-- Lips -->
    <ellipse cx="17.5" cy="17.5" rx="2.5" ry="1" fill="#c44569"/>
    <ellipse cx="17.5" cy="17.2" rx="1.5" ry="0.5" fill="#d85580" opacity="0.5"/>
    <!-- Earring (right side) -->
    <circle cx="24.5" cy="18.5" r="0.9" fill="#f0c040"/>
    <circle cx="24.5" cy="18.5" r="0.4" fill="#d4a017"/>
    <!-- Necklace -->
    <path d="M12.5,21.5 Q16,23.5 19.5,21.5" fill="none" stroke="#f0c040" stroke-width="0.5"/>
    <circle cx="16" cy="23" r="0.8" fill="#f0c040"/>
  </g>

  <!-- ===== Direction 1 upper (down-left) ===== -->
  <g id="wu1">
    <path d="M9,20 L23,20 L25,34 L7,34 Z" fill="url(#dress)"/>
    <path d="M7,33 L25,33 L25.2,34.2 L6.8,34.2 Z" fill="#12876a" opacity="0.5"/>
    <path d="M23,20 L20,20 L22,34 L25,34 Z" fill="#085a3a" opacity="0.25"/>
    <rect x="8" y="25" width="16" height="2" rx="1" fill="#d4a017"/>
    <line x1="8" y1="25.4" x2="24" y2="25.4" stroke="#f0c040" stroke-width="0.5" opacity="0.6"/>
    <rect x="14" y="24.5" width="3" height="3" rx="0.5" fill="#f0c040"/>
    <rect x="14.8" y="25.2" width="1.4" height="1.6" rx="0.3" fill="#d4a017"/>
    <!-- Arms -->
    <rect x="5" y="21" width="3.5" height="10" rx="1.5" fill="#f0be8a"/>
    <rect x="23.5" y="21" width="3.5" height="10" rx="1.5" fill="#f0be8a"/>
    <!-- Head -->
    <ellipse cx="16" cy="14" rx="8" ry="9" fill="#f0be8a"/>
    <circle cx="11" cy="16" r="2.2" fill="#e8a090" opacity="0.2"/>
    <circle cx="19.5" cy="16" r="2.2" fill="#e8a090" opacity="0.2"/>
    <!-- Hair -->
    <ellipse cx="16" cy="9" rx="10" ry="6" fill="#5c2018"/>
    <path d="M6,9 Q4.5,17 7,24 Q8.5,25.5 9.5,23 L9,9 Z" fill="#5c2018"/>
    <path d="M26,9 Q27.5,17 25,24 Q23.5,25.5 22.5,23 L23,9 Z" fill="#5c2018"/>
    <ellipse cx="19" cy="7.5" rx="5" ry="3" fill="#8b3d20" opacity="0.6"/>
    <ellipse cx="13" cy="7" rx="3" ry="2" fill="#c87a4a" opacity="0.35"/>
    <ellipse cx="17" cy="6" rx="4" ry="1.5" fill="#d4a040" opacity="0.15"/>
    <!-- Eyes (shifted left for dir 1) -->
    <ellipse cx="11" cy="13.5" rx="1.8" ry="1.5" fill="#2a8b8b"/>
    <ellipse cx="17" cy="13.5" rx="1.8" ry="1.5" fill="#2a8b8b"/>
    <circle cx="10.5" cy="13.5" r="0.7" fill="#1a3a3a"/>
    <circle cx="16.5" cy="13.5" r="0.7" fill="#1a3a3a"/>
    <circle cx="11.5" cy="13" r="0.4" fill="white" opacity="0.6"/>
    <circle cx="17.5" cy="13" r="0.4" fill="white" opacity="0.6"/>
    <line x1="9" y1="11.8" x2="13.2" y2="11.8" stroke="#2d2d2d" stroke-width="0.7"/>
    <line x1="15" y1="11.8" x2="19.2" y2="11.8" stroke="#2d2d2d" stroke-width="0.7"/>
    <!-- Lips -->
    <ellipse cx="14.5" cy="17.5" rx="2.5" ry="1" fill="#c44569"/>
    <ellipse cx="14.5" cy="17.2" rx="1.5" ry="0.5" fill="#d85580" opacity="0.5"/>
    <!-- Earring (left side) -->
    <circle cx="7.5" cy="18.5" r="0.9" fill="#f0c040"/>
    <circle cx="7.5" cy="18.5" r="0.4" fill="#d4a017"/>
    <!-- Necklace -->
    <path d="M12.5,21.5 Q16,23.5 19.5,21.5" fill="none" stroke="#f0c040" stroke-width="0.5"/>
    <circle cx="16" cy="23" r="0.8" fill="#f0c040"/>
  </g>

  <!-- ===== Direction 2 upper (up-left, back view) ===== -->
  <g id="wu2">
    <path d="M9,20 L23,20 L25,34 L7,34 Z" fill="url(#dress)"/>
    <path d="M7,33 L25,33 L25.2,34.2 L6.8,34.2 Z" fill="#12876a" opacity="0.5"/>
    <rect x="8" y="25" width="16" height="2" rx="1" fill="#d4a017"/>
    <line x1="8" y1="25.4" x2="24" y2="25.4" stroke="#f0c040" stroke-width="0.5" opacity="0.6"/>
    <!-- Arm (inner, up-left) -->
    <rect x="11" y="21" width="3.5" height="10" rx="1.5" fill="#f0be8a"/>
    <!-- Head -->
    <ellipse cx="16" cy="14" rx="8" ry="9" fill="#f0be8a"/>
    <!-- Full back hair covering head -->
    <ellipse cx="16" cy="12" rx="10" ry="9" fill="#5c2018"/>
    <!-- Long flowing hair cascade -->
    <path d="M6,12 Q5.5,22 10,28 Q13,31 16,30 Q19,31 22,28 Q26.5,22 26,12 Z" fill="#5c2018"/>
    <!-- Hair depth layers -->
    <path d="M8,14 Q9,24 12,27 Q14,28 13,22 Z" fill="#7b3520" opacity="0.4"/>
    <path d="M24,14 Q23,24 20,27 Q18,28 19,22 Z" fill="#7b3520" opacity="0.4"/>
    <!-- Copper highlight streaks -->
    <path d="M11,10 Q12,20 13,26" fill="none" stroke="#c87a4a" stroke-width="1.2" opacity="0.35" stroke-linecap="round"/>
    <path d="M21,10 Q20.5,20 19.5,26" fill="none" stroke="#c87a4a" stroke-width="0.8" opacity="0.3" stroke-linecap="round"/>
    <path d="M16,8 Q16.5,18 16,25" fill="none" stroke="#8b3d20" stroke-width="0.6" opacity="0.3" stroke-linecap="round"/>
    <!-- Golden top sheen -->
    <ellipse cx="16" cy="8" rx="5" ry="3" fill="#d4a040" opacity="0.12"/>
  </g>

  <!-- ===== Direction 3 upper (up-right, back view) ===== -->
  <g id="wu3">
    <path d="M9,20 L23,20 L25,34 L7,34 Z" fill="url(#dress)"/>
    <path d="M7,33 L25,33 L25.2,34.2 L6.8,34.2 Z" fill="#12876a" opacity="0.5"/>
    <rect x="8" y="25" width="16" height="2" rx="1" fill="#d4a017"/>
    <line x1="8" y1="25.4" x2="24" y2="25.4" stroke="#f0c040" stroke-width="0.5" opacity="0.6"/>
    <!-- Arm (inner, up-right) -->
    <rect x="17.5" y="21" width="3.5" height="10" rx="1.5" fill="#f0be8a"/>
    <!-- Head -->
    <ellipse cx="16" cy="14" rx="8" ry="9" fill="#f0be8a"/>
    <!-- Full back hair covering head -->
    <ellipse cx="16" cy="12" rx="10" ry="9" fill="#5c2018"/>
    <path d="M6,12 Q5.5,22 10,28 Q13,31 16,30 Q19,31 22,28 Q26.5,22 26,12 Z" fill="#5c2018"/>
    <path d="M8,14 Q9,24 12,27 Q14,28 13,22 Z" fill="#7b3520" opacity="0.4"/>
    <path d="M24,14 Q23,24 20,27 Q18,28 19,22 Z" fill="#7b3520" opacity="0.4"/>
    <path d="M11,10 Q12,20 13,26" fill="none" stroke="#c87a4a" stroke-width="1.2" opacity="0.35" stroke-linecap="round"/>
    <path d="M21,10 Q20.5,20 19.5,26" fill="none" stroke="#c87a4a" stroke-width="0.8" opacity="0.3" stroke-linecap="round"/>
    <path d="M16,8 Q16.5,18 16,25" fill="none" stroke="#8b3d20" stroke-width="0.6" opacity="0.3" stroke-linecap="round"/>
    <ellipse cx="16" cy="8" rx="5" ry="3" fill="#d4a040" opacity="0.12"/>
  </g>

  <!-- ===== Woman legs neutral ===== -->
  <g id="wn">
    <rect x="12" y="34" width="3" height="6" rx="0.5" fill="#f0be8a"/>
    <rect x="17" y="34" width="3" height="6" rx="0.5" fill="#f0be8a"/>
    <rect x="11" y="39" width="4" height="3" rx="1" fill="#6b2535"/>
    <rect x="17" y="39" width="4" height="3" rx="1" fill="#6b2535"/>
    <!-- Heel detail -->
    <rect x="11" y="41" width="1.2" height="1.5" rx="0.3" fill="#4a1a25"/>
    <rect x="20" y="41" width="1.2" height="1.5" rx="0.3" fill="#4a1a25"/>
  </g>

  <!-- ===== Woman legs stride right (legOffset=3) ===== -->
  <g id="wr">
    <rect x="12" y="34" width="3" height="9" rx="0.5" fill="#f0be8a"/>
    <rect x="17" y="34" width="3" height="3" rx="0.5" fill="#f0be8a"/>
    <rect x="11" y="42" width="4" height="3" rx="1" fill="#6b2535"/>
    <rect x="17" y="36" width="4" height="3" rx="1" fill="#6b2535"/>
    <rect x="11" y="44" width="1.2" height="1.5" rx="0.3" fill="#4a1a25"/>
    <rect x="20" y="38" width="1.2" height="1.5" rx="0.3" fill="#4a1a25"/>
  </g>

  <!-- ===== Woman legs stride left (legOffset=-3) ===== -->
  <g id="wl">
    <rect x="12" y="34" width="3" height="3" rx="0.5" fill="#f0be8a"/>
    <rect x="17" y="34" width="3" height="9" rx="0.5" fill="#f0be8a"/>
    <rect x="11" y="36" width="4" height="3" rx="1" fill="#6b2535"/>
    <rect x="17" y="42" width="4" height="3" rx="1" fill="#6b2535"/>
    <rect x="11" y="38" width="1.2" height="1.5" rx="0.3" fill="#4a1a25"/>
    <rect x="20" y="44" width="1.2" height="1.5" rx="0.3" fill="#4a1a25"/>
  </g>
</defs>

<!-- ===== Dir 0 (down-right) row y=0 ===== -->
<g transform="translate(0,0)"><use href="#sh"/><use href="#wu0"/><use href="#wn"/></g>
<g transform="translate(32,0)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#wu0"/><use href="#wr"/></g></g>
<g transform="translate(64,0)"><use href="#sh"/><use href="#wu0"/><use href="#wn"/></g>
<g transform="translate(96,0)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#wu0"/><use href="#wl"/></g></g>

<!-- ===== Dir 1 (down-left) row y=48 ===== -->
<g transform="translate(0,48)"><use href="#sh"/><use href="#wu1"/><use href="#wn"/></g>
<g transform="translate(32,48)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#wu1"/><use href="#wr"/></g></g>
<g transform="translate(64,48)"><use href="#sh"/><use href="#wu1"/><use href="#wn"/></g>
<g transform="translate(96,48)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#wu1"/><use href="#wl"/></g></g>

<!-- ===== Dir 2 (up-left) row y=96 ===== -->
<g transform="translate(0,96)"><use href="#sh"/><use href="#wu2"/><use href="#wn"/></g>
<g transform="translate(32,96)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#wu2"/><use href="#wr"/></g></g>
<g transform="translate(64,96)"><use href="#sh"/><use href="#wu2"/><use href="#wn"/></g>
<g transform="translate(96,96)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#wu2"/><use href="#wl"/></g></g>

<!-- ===== Dir 3 (up-right) row y=144 ===== -->
<g transform="translate(0,144)"><use href="#sh"/><use href="#wu3"/><use href="#wn"/></g>
<g transform="translate(32,144)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#wu3"/><use href="#wr"/></g></g>
<g transform="translate(64,144)"><use href="#sh"/><use href="#wu3"/><use href="#wn"/></g>
<g transform="translate(96,144)"><use href="#sh"/><g transform="translate(0,-1)"><use href="#wu3"/><use href="#wl"/></g></g>
</svg>
